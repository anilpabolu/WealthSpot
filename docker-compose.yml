version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wealthspot
      POSTGRES_PASSWORD: wealthspot_dev
      POSTGRES_DB: wealthspot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealthspot"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./services/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://wealthspot:wealthspot_dev@postgres:5432/wealthspot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api/app:/app/app  # hot-reload in dev

  # ── Celery Worker ───────────────────────────────────────────
  celery-worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file:
      - ./services/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://wealthspot:wealthspot_dev@postgres:5432/wealthspot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Vite Dev Server (Web) ──────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/src  # hot-reload in dev
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1

volumes:
  pgdata:
