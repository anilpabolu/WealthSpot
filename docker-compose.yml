services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wealthspot
      POSTGRES_PASSWORD: wealthspot_dev
      POSTGRES_DB: wealthspot
    ports:
      - "5433:5432"  # 5432 used by local postgres; mapped to 5433
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealthspot"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage for dev) ───────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init (creates default bucket on first run) ─
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set ws http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing ws/wealthspot-media;
      mc anonymous set download ws/wealthspot-media;
      printf '{\"CORSRules\":[{\"AllowedOrigins\":[\"*\"],\"AllowedMethods\":[\"GET\",\"HEAD\"],\"AllowedHeaders\":[\"*\"],\"MaxAgeSeconds\":3600}]}' > /tmp/cors.json;
      mc cors set ws/wealthspot-media /tmp/cors.json || true;
      exit 0;
      "

  # ── FastAPI Backend ─────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./services/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://wealthspot:wealthspot_dev@postgres:5432/wealthspot
      REDIS_URL: redis://redis:6379/0
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_S3_BUCKET: wealthspot-media
      AWS_REGION: us-east-1
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000/wealthspot-media
      # ENCRYPTION_KEY must be set in services/api/.env – never hardcode secrets
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./services/api/app:/app/app  # hot-reload in dev
      - ./services/api/alembic:/app/alembic  # pick up new migrations in dev

  # ── Celery Worker ───────────────────────────────────────────
  celery-worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: development
    command: celery -A app.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file:
      - ./services/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://wealthspot:wealthspot_dev@postgres:5432/wealthspot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      # ENCRYPTION_KEY must be set in services/api/.env – never hardcode secrets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Vite Dev Server (Web) ──────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/apps/web/src  # hot-reload in dev
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1

  # ── Test Runner (opt-in: docker compose --profile test up test-runner) ──
  # Not started by default. Enable with: COMPOSE_PROFILES=test or --profile test
  test-runner:
    profiles: ["test"]
    build:
      context: .
      dockerfile: tests/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://wealthspot:wealthspot_dev@postgres:5432/wealthspot
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: test-secret-key-for-unit-tests
      APP_ENV: testing
      CORS_ORIGINS: "*"
      CELERY_BROKER_URL: redis://redis:6379/1
      ENCRYPTION_KEY: XdhWucM5GcQhgX7PZlpPriT9s8gkp7UvsD-xDbDVZD0=
      VITE_API_BASE_URL: http://api:8000/api/v1
    volumes:
      - ./tests:/app/tests
      - ./apps/web/src:/app/apps/web/src:ro
      - ./apps/mobile/src:/app/apps/mobile/src:ro
      - ./packages:/app/packages:ro
      - ./services/api/app:/app/services/api/app:ro

volumes:
  pgdata:
  minio_data:
