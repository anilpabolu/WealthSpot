name: CI

"on":
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend Lint & Type-Check ──────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ".[dev]"
      - run: ruff check app/
      - run: ruff format --check app/

  # ── Backend Tests ──────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: wealthspot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/wealthspot_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: testing
      JWT_SECRET_KEY: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ".[dev]"
      - run: pytest --cov=app --cov-report=xml --cov-report=term-missing -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: services/api/coverage.xml

  # ── Backend Docker Build ───────────────────────────────
  backend-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target production -t wealthspot-api:ci services/api/

  # ── Frontend Lint & Type-Check ─────────────────────────
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  # ── Frontend Build ─────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  # ── Frontend Tests ─────────────────────────────────────
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: apps/web/coverage/

  # ── Frontend BFF Functional Tests ──────────────────────
  frontend-functional:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run -c vitest.functional.config.ts

  # ── Mobile Tests ───────────────────────────────────────
  mobile-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run

  # ── E2E Playwright Tests ───────────────────────────────
  e2e-test:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:5173
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # ── Security: Docker Image Scan ────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: backend-docker
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target production -t wealthspot-api:scan services/api/
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: wealthspot-api:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
